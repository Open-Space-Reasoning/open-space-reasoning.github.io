<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Space Reasoning</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background-color: #f5f7fa;
      color: #333;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px 20px;
      background-image: url('https://github.com/Open-Space-Reasoning/open-space-reasoning.github.io/blob/main/docs/logo-m4r.png?fit=crop&w=1950&q=80');
      background-size: cover;
      background-position: center;
      color: white;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 1.25rem;
      max-width: 700px;
    }
    .cta-button {
      margin-top: 40px;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .cta-button:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Open Space Reasoning</h1>
    <p>
      Evaluating multi-modal AI reasoning across dynamic land, air, and water environments.
    </p>
    <!-- <button class="cta-button">Explore Benchmark</button> -->
    <a class="cta-button" href="https://github.com/SafeRL-Lab/Open-Space-Reasoning" target="_blank">Explore Benchmark</a>
  </section>
</body>
</html>
